name: Test and Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - "**"
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Go tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: bbs
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: bbs/go.mod
          cache-dependency-path: bbs/go.sum

      - name: Run tests with coverage
        run: |
          go test ./cmd/bbs -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "## Go coverage report"
            echo
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          coverage="$(awk '/^total:/ {gsub(/%/, "", $3); print $3}' coverage.txt)"
          awk -v coverage="$coverage" 'BEGIN {
            if (coverage + 0 < 60) {
              printf("Coverage %.1f%% is below required 60%%\n", coverage)
              exit 1
            }
            printf("Coverage %.1f%% meets required 60%%\n", coverage)
          }'

  docker:
    name: Docker image
    runs-on: self-hosted
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    env:
      IMAGE_VERSION: ${{ github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./bbs
          file: ./bbs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Docker host
    runs-on: self-hosted
    needs: docker
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    env:
      DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || '/opt/stacks/ham-bbs/docker-compose.yaml' }}
      DEPLOY_SERVICE: ${{ vars.DEPLOY_SERVICE || 'bbs' }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and redeploy service
        run: |
          compose_dir="$(dirname "$DEPLOY_COMPOSE_FILE")"
          test -f "$DEPLOY_COMPOSE_FILE"
          docker compose --project-directory "$compose_dir" -f "$DEPLOY_COMPOSE_FILE" pull "$DEPLOY_SERVICE"
          docker compose --project-directory "$compose_dir" -f "$DEPLOY_COMPOSE_FILE" up -d --no-deps "$DEPLOY_SERVICE"
