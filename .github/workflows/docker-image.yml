name: Test and Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Go tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: bbs
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: bbs/go.mod
          cache-dependency-path: bbs/go.sum

      - name: Run tests with coverage
        run: |
          go test ./cmd/bbs -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tee coverage.txt
          {
            echo "## Go coverage report"
            echo
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          coverage="$(awk '/^total:/ {gsub(/%/, "", $3); print $3}' coverage.txt)"
          awk -v coverage="$coverage" 'BEGIN {
            if (coverage + 0 < 60) {
              printf("Coverage %.1f%% is below required 60%%\n", coverage)
              exit 1
            }
            printf("Coverage %.1f%% meets required 60%%\n", coverage)
          }'

  docker:
    name: Docker image
    runs-on: self-hosted
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,format=short,prefix=ci-,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./bbs
          file: ./bbs/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
