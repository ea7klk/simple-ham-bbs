name: Test and Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
    branches:
      - "**"
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Go tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: source/bbs
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: source

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: source/bbs/go.mod
          cache-dependency-path: source/bbs/go.sum

      - name: Run tests with coverage
        run: |
          go test ./cmd/bbs -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html
          echo "::group::Go coverage report"
          cat coverage.txt
          echo "::endgroup::"
          {
            echo "## Go coverage report"
            echo
            echo "[Download the HTML coverage report from the workflow artifacts.](#artifacts)"
            echo
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          coverage="$(awk '/^total:/ {gsub(/%/, "", $3); print $3}' coverage.txt)"
          awk -v coverage="$coverage" 'BEGIN {
            if (coverage + 0 < 60) {
              printf("Coverage %.1f%% is below required 60%%\n", coverage)
              exit 1
            }
            printf("Coverage %.1f%% meets required 60%%\n", coverage)
          }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage-report
          path: |
            source/bbs/coverage.out
            source/bbs/coverage.txt
            source/bbs/coverage.html

  docker:
    name: Docker image
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'release'
    env:
      IMAGE_VERSION: ${{ github.event.release.tag_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: source

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ env.IMAGE_VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./source/bbs
          file: ./source/bbs/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Restart bbs-web
    runs-on: self-hosted
    needs: docker
    if: github.event_name == 'release'
    steps:
      - name: Restart bbs-web stack
        working-directory: /opt/stacks/ham-bbs
        run: |
          docker compose pull bbs
          docker compose down bbs
          docker compose up bbs -d
